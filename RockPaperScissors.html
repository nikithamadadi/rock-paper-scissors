<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="RockPaperScissors.css">
</head>
<body>
    <p class="name">ROCK PAPER SCISSORS GAME</p>
    <button class="move-btn" onclick="
    playGame('Rock')
    ">
    <img class="move-img" src="images/Rock-emoji.png" alt="">

    </button>
    <button class="move-btn" onclick="
    playGame('Paper')
    ">
    <img class="move-img" src="images/Paper-emoji.png" alt="">

    </button>
    <button class="move-btn" onclick="
    playGame('Scissors')
    ">
    <img class="move-img" src="images/Scissors-emoji.png" alt="">

    </button>
    <p class="js-result result"></p>
    <p class="js-moves moves"></p>
    <p class="js-score score"></p>

    <button class="reset-score-btn" onclick="
    score.wins=0;
    score.losses=0;
    score.Ties=0;
    localStorage.removeItem('score');
    updateScore();
    ">
    Reset Score

    </button>
    <script src="RockPaperScissors.js"></script>
</body>
</html>
